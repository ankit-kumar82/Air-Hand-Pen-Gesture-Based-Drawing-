<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Air Draw</title>
    <!-- MediaPipe Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #controls {
            position: absolute;
            top: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 20px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #video_input {
            display: none; /* Hidden, used for processing */
        }

        #draw_canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
            cursor: crosshair;
        }

        #guide_canvas {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            border-radius: 10px;
            border: 2px solid #333;
            z-index: 6;
            transform: scaleX(-1); /* Mirror view */
        }

        label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="color"] { border: none; width: 30px; height: 30px; cursor: pointer; background: none; }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-group">
            <label>Color</label>
            <input type="color" id="colorPicker" value="#00ffff">
        </div>
        <div class="control-group">
            <label>Size</label>
            <input type="range" id="sizeSlider" min="2" max="20" value="5">
        </div>
        <div id="status" style="font-weight: bold; color: #00ff00;">Ready</div>
    </div>

    <div class="canvas-container">
        <video id="video_input"></video>
        <canvas id="draw_canvas"></canvas>
        <canvas id="guide_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('video_input');
        const drawCanvas = document.getElementById('draw_canvas');
        const guideCanvas = document.getElementById('guide_canvas');
        const drawCtx = drawCanvas.getContext('2d');
        const guideCtx = guideCanvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const sizeSlider = document.getElementById('sizeSlider');
        const statusText = document.getElementById('status');

        let lastX = 0;
        let lastY = 0;
        let isDrawing = false;

        // Resize canvases
        function resize() {
            drawCanvas.width = window.innerWidth;
            drawCanvas.height = window.innerHeight;
            // Fill background
            drawCtx.fillStyle = '#0a0a0a';
            drawCtx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
        }
        window.addEventListener('resize', resize);
        resize();

        function onResults(results) {
            // Draw visual guide (mini video overlay)
            guideCtx.save();
            guideCtx.clearRect(0, 0, guideCanvas.width, guideCanvas.height);
            guideCtx.drawImage(results.image, 0, 0, guideCanvas.width, guideCanvas.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Finger tips and palm points
                const indexTip = landmarks[8];
                const indexDip = landmarks[7];
                const middleTip = landmarks[12];
                const thumbTip = landmarks[4];
                const pinkyTip = landmarks[20];

                // Coordinate conversion (Mirrored)
                const x = (1 - indexTip.x) * drawCanvas.width;
                const y = indexTip.y * drawCanvas.height;

                // Gesture Logic
                const isIndexUp = indexTip.y < indexDip.y;
                const isMiddleUp = middleTip.y < landmarks[11].y;
                const isPinkyUp = pinkyTip.y < landmarks[19].y;

                // 1. CLEAR: Open Palm (All fingers roughly up/extended)
                if (isIndexUp && isMiddleUp && isPinkyUp) {
                    statusText.innerText = "ERASING";
                    statusText.style.color = "#ff4444";
                    drawCtx.fillStyle = '#0a0a0a';
                    drawCtx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
                    isDrawing = false;
                } 
                // 2. PAUSE: Closed Fist (Fingers below knuckles)
                else if (!isIndexUp && !isMiddleUp) {
                    statusText.innerText = "PAUSED";
                    statusText.style.color = "#ffff00";
                    isDrawing = false;
                }
                // 3. DRAW: Only Index Up
                else if (isIndexUp && !isMiddleUp) {
                    statusText.innerText = "DRAWING";
                    statusText.style.color = "#00ff00";
                    
                    if (!isDrawing) {
                        isDrawing = true;
                        lastX = x;
                        lastY = y;
                    }

                    drawCtx.beginPath();
                    drawCtx.moveTo(lastX, lastY);
                    drawCtx.lineTo(x, y);
                    
                    // Neon Style
                    const color = colorPicker.value;
                    drawCtx.strokeStyle = color;
                    drawCtx.lineWidth = sizeSlider.value;
                    drawCtx.lineCap = 'round';
                    drawCtx.shadowBlur = 15;
                    drawCtx.shadowColor = color;
                    
                    drawCtx.stroke();
                    lastX = x;
                    lastY = y;
                }

                // Draw hand skeleton on mini guide
                drawConnectors(guideCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
            } else {
                statusText.innerText = "NO HAND DETECTED";
                statusText.style.color = "white";
                isDrawing = false;
            }
            guideCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();
    </script>
</body>
</html>
